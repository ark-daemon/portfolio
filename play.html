<body data-page="play">

  <div class="snake-screen" id="game-stage">
    <div class="snake-board-wrap">
      <canvas id="snake-canvas" width="360" height="360" aria-label="Snake game board"></canvas>
      <p class="snake-end" id="game-end" hidden></p>
      <p class="snake-keys">Arrows / WASD</p>
      <div class="snake-meta">
        <span class="snake-meta-stat">Score <strong id="game-score">0</strong></span>
        <span class="snake-meta-stat">Best <strong id="game-best">0</strong></span>
      </div>
      <div class="snake-footer" role="group" aria-label="Controls">
        <button type="button" class="snake-keycap" id="snake-start">
          <kbd>space</kbd><span>start</span>
        </button>
        <a href="index.html" class="snake-keycap" aria-label="Close and return home">
          <kbd>esc</kbd><span>close</span>
        </a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
